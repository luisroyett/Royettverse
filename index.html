<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Luisroyett</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <style>
        /* --- VARIABLES Y RESET --- */
        :root {
            --bg-main: #0f1115;
            --bg-sidebar: #16181d;
            --bg-card: #1e2128;
            --bg-input: #101114;
            --border-color: #2a2d35;
            --text-main: #ffffff;
            --text-muted: #8b8e98;
            --accent: #6c5ce7;
            --success: #00cec9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
        }

        /* --- LOGIN --- */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at top right, #1a1c22, #000);
            display: flex; justify-content: center; align-items: center; z-index: 3000;
        }
        
        .login-card {
            background: rgba(30, 33, 40, 0.9); backdrop-filter: blur(10px);
            padding: 50px; border-radius: 20px; border: 1px solid var(--border-color);
            text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .login-card h2 { font-family: 'Oswald'; font-size: 2rem; margin-bottom: 10px; color: var(--accent); }
        .login-card p { color: var(--text-muted); margin-bottom: 30px; font-size: 0.9rem; }
        
        .login-input {
            width: 100%; padding: 15px; margin-bottom: 20px; background: var(--bg-input);
            border: 1px solid var(--border-color); border-radius: 10px; color: white; font-size: 1rem;
        }
        .login-input:focus { outline: none; border-color: var(--accent); }

        .login-btn {
            width: 100%; padding: 15px; background: var(--accent); border: none;
            border-radius: 10px; color: white; font-weight: 600; font-size: 1rem;
            cursor: pointer; transition: 0.3s;
        }
        .login-btn:hover { background: #5b4cdb; }

        /* --- LAYOUT PRINCIPAL --- */
        .admin-layout { display: none; height: 100vh; flex-direction: column; }
        
        /* Top Bar */
        .top-bar {
            background: var(--bg-sidebar); padding: 0 30px; height: 70px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border-color);
        }
        .logo-area { display: flex; align-items: center; gap: 15px; }
        .logo-icon {
            width: 40px; height: 40px; background: var(--accent); border-radius: 10px;
            display: flex; align-items: center; justify-content: center; font-weight: bold;
        }
        .logo-text h1 { font-size: 1.2rem; font-family: 'Oswald'; text-transform: uppercase; }
        .logo-text span { font-size: 0.7rem; color: var(--text-muted); display: block; }

        .btn-view-site {
            background: transparent; border: 1px solid var(--border-color); color: var(--text-muted);
            padding: 10px 20px; border-radius: 8px; text-decoration: none; transition: 0.3s; font-weight: 500;
        }
        .btn-view-site:hover { border-color: var(--success); color: var(--success); }

        /* Tabs */
        .tabs-nav {
            background: var(--bg-sidebar); padding: 0 30px; display: flex;
            gap: 10px; border-bottom: 1px solid var(--border-color);
        }
        .tab-link {
            padding: 15px 25px; background: transparent; border: none;
            color: var(--text-muted); cursor: pointer; font-weight: 600;
            border-bottom: 3px solid transparent; transition: 0.2s;
        }
        .tab-link.active { color: var(--text-main); border-bottom-color: var(--accent); }

        /* Main Content */
        .main-content { display: flex; flex: 1; overflow: hidden; }

        /* Sidebar */
        .sidebar {
            width: 320px; background: var(--bg-sidebar); border-right: 1px solid var(--border-color);
            padding: 25px; overflow-y: auto;
        }
        
        .input-box { margin-bottom: 25px; }
        .input-label {
            display: block; font-size: 0.8rem; text-transform: uppercase;
            color: var(--text-muted); margin-bottom: 8px; font-weight: 600;
        }
        .input-field {
            width: 100%; padding: 12px; background: var(--bg-input);
            border: 1px solid var(--border-color); border-radius: 8px; color: white;
            transition: 0.3s;
        }
        .input-field:focus { outline: none; border-color: var(--accent); }

        .upload-zone {
            border: 2px dashed var(--border-color); border-radius: 12px;
            padding: 20px; text-align: center; cursor: pointer; transition: 0.3s;
        }
        .upload-zone:hover { border-color: var(--accent); background: rgba(108, 92, 231, 0.05); }
        .upload-zone img { width: 100%; border-radius: 8px; margin-top: 10px; display: none; max-height: 200px; object-fit: cover; }
        .upload-text { color: var(--text-muted); font-size: 0.9rem; display: flex; flex-direction: column; align-items: center; gap: 5px; }

        /* Builder Area */
        .builder-area {
            flex: 1; padding: 30px; overflow-y: auto;
            background: var(--bg-main); display: flex; flex-direction: column; gap: 20px;
        }
        
        .builder-toolbar {
            display: flex; gap: 10px; padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color); margin-bottom: 10px;
            position: sticky; top: 0; background: var(--bg-main); z-index: 10;
        }
        
        .btn-add {
            background: var(--bg-card); border: 1px solid var(--border-color);
            color: var(--text-main); padding: 10px 20px; border-radius: 8px;
            cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: 500; transition: 0.2s;
        }
        .btn-add:hover { background: var(--accent); border-color: var(--accent); }

        /* Blocks */
        .block-item {
            background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: 12px; overflow: hidden; transition: 0.3s;
        }
        .block-header {
            background: #16181d; padding: 10px 15px; display: flex;
            justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color);
        }
        .block-title { font-weight: 600; font-size: 0.9rem; color: var(--accent); display: flex; align-items: center; gap: 8px; }
        .block-actions button {
            background: transparent; border: none; color: var(--text-muted);
            cursor: pointer; font-size: 1rem; padding: 5px; transition: 0.2s;
        }
        .block-actions button:hover { color: var(--text-main); }
        .block-body { padding: 15px; }

        /* Rich Editor Toolbar */
        .rte-toolbar {
            display: flex; gap: 5px; margin-bottom: 10px; background: #16181d;
            padding: 8px; border-radius: 6px; flex-wrap: wrap;
        }
        .rte-btn {
            background: #222; border: none; color: #ccc; padding: 5px 10px;
            border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.2s;
        }
        .rte-btn:hover { background: var(--accent); color: white; }
        .rte-select {
            background: #222; border: none; color: #ccc; padding: 5px;
            border-radius: 4px; font-size: 0.9rem;
        }
        
        .content-editor {
            min-height: 120px; background: var(--bg-input); padding: 15px;
            border-radius: 8px; color: white; border: 1px solid var(--border-color);
            outline: none; line-height: 1.5; font-size: 0.95rem;
        }
        .content-editor:focus { border-color: var(--accent); }

        /* Top Anime Editor */
        .top-editor-container { padding: 40px; max-width: 700px; margin: 0 auto; width: 100%; }
        .top-card-edit {
            background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: 12px; padding: 20px; margin-bottom: 15px;
            display: flex; align-items: center; gap: 20px;
        }
        .rank-circle {
            width: 50px; height: 50px; background: var(--accent); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-weight: bold;
            font-size: 1.5rem; flex-shrink: 0;
        }

        /* Publish Footer */
        .publish-footer {
            margin-top: auto; padding-top: 20px; border-top: 1px solid var(--border-color);
            text-align: right; background: var(--bg-main);
        }
        .btn-publish-main {
            background: linear-gradient(90deg, var(--accent), #a55eea); color: white;
            border: none; padding: 15px 40px; border-radius: 10px; font-size: 1.1rem;
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn-publish-main:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(108, 92, 231, 0.3); }

        /* Toast Notification */
        #toast {
            visibility: hidden; min-width: 250px; background-color: var(--success);
            color: #000; text-align: center; border-radius: 8px; padding: 16px;
            position: fixed; z-index: 5000; right: 30px; bottom: 30px;
            font-weight: 600; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transform: translateY(100px); opacity: 0; transition: 0.5s;
        }
        #toast.show { visibility: visible; transform: translateY(0); opacity: 1; }

        /* Responsive */
        @media (max-width: 768px) {
            .main-content { flex-direction: column; height: auto; }
            .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--border-color); }
            .builder-area { height: auto; }
        }
    </style>
</head>
<body>

    <!-- Pantalla de Login -->
    <div id="login-screen">
        <div class="login-card">
            <h2>LUISROYETT</h2>
            <p>Panel de Administración</p>
            <input type="password" id="pass-input" class="login-input" placeholder="Contraseña" onkeydown="if(event.key==='Enter')login()">
            <button class="login-btn" onclick="login()">Acceder</button>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast">Cambio guardado exitosamente</div>

    <!-- Dashboard Principal -->
    <div class="admin-layout" id="admin-app">
        
        <!-- Top Bar -->
        <div class="top-bar">
            <div class="logo-area">
                <div class="logo-icon">LR</div>
                <div class="logo-text">
                    <h1>Dashboard</h1>
                    <span>Panel de Control</span>
                </div>
            </div>
            <a href="index.html" target="_blank" class="btn-view-site">👁 Ver Sitio Web</a>
        </div>

        <!-- Tabs Nav -->
        <div class="tabs-nav">
            <button class="tab-link active" onclick="switchTab(0)">📰 Noticias</button>
            <button class="tab-link" onclick="switchTab(1)">🏆 Top Anime</button>
        </div>

        <!-- Contenido Dinámico -->
        <div class="main-content">
            
            <!-- TAB 1: NOTICIAS -->
            <div class="tab-content active" id="tab-news" style="display:flex; width:100%;">
                
                <!-- Sidebar Config -->
                <div class="sidebar">
                    <div class="input-box">
                        <label class="input-label">Título Principal</label>
                        <input type="text" id="main-title" class="input-field" placeholder="Título de la entrada">
                    </div>
                    
                    <div class="input-box">
                        <label class="input-label">Portada</label>
                        <div class="upload-zone" onclick="document.getElementById('cover-input').click()">
                            <input type="file" id="cover-input" hidden accept="image/*" onchange="previewCover(this)">
                            <div class="upload-text">
                                <span>📷</span>
                                Subir Imagen
                            </div>
                            <img id="cover-preview" src="">
                        </div>
                    </div>

                    <div class="input-box">
                        <label class="input-label">Fecha</label>
                        <input type="text" id="main-date" class="input-field" disabled>
                    </div>
                </div>

                <!-- Builder Area -->
                <div class="builder-area">
                    <div class="builder-toolbar">
                        <button class="btn-add" onclick="addBlock('text')">📝 Texto</button>
                        <button class="btn-add" onclick="addBlock('image')">🖼 Imagen</button>
                        <button class="btn-add" onclick="addBlock('video')">▶️ Video</button>
                    </div>

                    <div id="blocks-container"></div>

                    <div class="publish-footer">
                        <button class="btn-publish-main" onclick="publishNews()">🚀 PUBLICAR NOTICIA</button>
                    </div>
                </div>
            </div>

            <!-- TAB 2: TOP ANIME -->
            <div class="tab-content" id="tab-top" style="display:none;">
                <div class="top-editor-container">
                    <h2 style="margin-bottom:20px; color:var(--text-muted); border-bottom:1px solid var(--border-color); padding-bottom:10px;">Editar Top 3 Semanal</h2>
                    <div id="top-editor-list"></div>
                    <button class="btn-publish-main" onclick="saveTop()" style="width:100%; margin-top:20px;">💾 GUARDAR CAMBIOS</button>
                </div>
            </div>

        </div>
    </div>

    <script>
        // --- LÓGICA DE LOGIN Y DATOS ---
        function login() {
            const pass = document.getElementById('pass-input').value;
            if(pass === "luisroyett") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('admin-app').style.display = 'flex';
                initAdmin();
            } else {
                alert("Contraseña incorrecta");
            }
        }

        // Sistema de Notificaciones Toast
        function showToast(message) {
            const x = document.getElementById("toast");
            x.innerText = message;
            x.className = "show";
            setTimeout(function(){ x.className = x.className.replace("show", ""); }, 3000);
        }

        let blocks = [];
        let blockCount = 0;

        function initAdmin() {
            document.getElementById('main-date').value = new Date().toLocaleDateString('es-ES', { day: 'numeric', month: 'short', year: 'numeric' }) + " - Luisroyett";
            
            // Cargar Top
            const topData = JSON.parse(localStorage.getItem('topAnime')) || [
                {rank:1, title:"Frieren", genre:"Fantasia"}, 
                {rank:2, title:"One Piece", genre:"Aventura"}, 
                {rank:3, title:"JJK", genre:"Accion"}
            ];
            const list = document.getElementById('top-editor-list');
            list.innerHTML = '';
            topData.forEach((item, i) => {
                list.innerHTML += `
                    <div class="top-card-edit">
                        <div class="rank-circle">${i+1}</div>
                        <div style="flex:1;">
                            <input type="text" id="top-title-${i}" value="${item.title}" style="width:100%; margin-bottom:5px; padding:10px; background:#101114; border:1px solid #2a2d35; color:white; border-radius:6px;">
                            <input type="text" id="top-genre-${i}" value="${item.genre}" style="width:100%; padding:10px; background:#101114; border:1px solid #2a2d35; color:white; border-radius:6px;">
                        </div>
                    </div>
                `;
            });
        }

        function switchTab(index) {
            document.querySelectorAll('.tab-link').forEach((t, i) => t.classList.toggle('active', i === index));
            document.querySelectorAll('.tab-content').forEach((c, i) => c.style.display = i === index ? 'flex' : 'none');
        }

        // --- BUILDER LOGIC ---
        function addBlock(type) {
            blocks.push({ id: blockCount++, type: type, content: '' });
            renderBlocks();
        }

        function moveBlock(id, dir) {
            const idx = blocks.findIndex(b => b.id === id);
            if(dir === 'up' && idx > 0) [blocks[idx], blocks[idx-1]] = [blocks[idx-1], blocks[idx]];
            if(dir === 'down' && idx < blocks.length-1) [blocks[idx], blocks[idx+1]] = [blocks[idx+1], blocks[idx]];
            renderBlocks();
        }

        function deleteBlock(id) {
            blocks = blocks.filter(b => b.id !== id);
            renderBlocks();
        }

        function renderBlocks() {
            const container = document.getElementById('blocks-container');
            container.innerHTML = '';
            
            blocks.forEach(b => {
                let html = '';
                
                if(b.type === 'text') {
                    html = `
                        <div class="block-item">
                            <div class="block-header">
                                <span class="block-title">📝 Párrafo</span>
                                <div class="block-actions">
                                    <button onclick="moveBlock(${b.id}, 'up')">⬆️</button>
                                    <button onclick="moveBlock(${b.id}, 'down')">⬇️</button>
                                    <button onclick="deleteBlock(${b.id})">🗑️</button>
                                </div>
                            </div>
                            <div class="block-body">
                                <div class="rte-toolbar">
                                    <button class="rte-btn" onclick="format('bold')"><b>B</b></button>
                                    <button class="rte-btn" onclick="format('italic')"><i>I</i></button>
                                    <button class="rte-btn" onclick="format('underline')"><u>U</u></button>
                                    <select class="rte-select" onchange="format('fontName', this.value)">
                                        <option value="Arial">Arial</option>
                                        <option value="Georgia">Georgia</option>
                                    </select>
                                    <select class="rte-select" onchange="format('fontSize', this.value)">
                                        <option value="3">Normal</option>
                                        <option value="5">Grande</option>
                                    </select>
                                </div>
                                <div id="txt-${b.id}" class="content-editor" contenteditable="true" oninput="updateText(${b.id})"></div>
                            </div>
                        </div>`;
                }
                else if(b.type === 'image') {
                    html = `
                        <div class="block-item">
                            <div class="block-header">
                                <span class="block-title">🖼 Imagen</span>
                                <div class="block-actions">
                                    <button onclick="moveBlock(${b.id}, 'up')">⬆️</button>
                                    <button onclick="moveBlock(${b.id}, 'down')">⬇️</button>
                                    <button onclick="deleteBlock(${b.id})">🗑️</button>
                                </div>
                            </div>
                            <div class="block-body" style="text-align:center; background:#101114; border-radius:8px;">
                                <img id="img-preview-${b.id}" src="${b.content}" style="max-width:100%; display:${b.content ? 'block' : 'none'}; border-radius:4px; margin:0 auto 10px;">
                                <input type="file" accept="image/*" onchange="handleImg(this, ${b.id})" style="display:${b.content ? 'none' : 'block'}; margin:10px auto;">
                            </div>
                        </div>`;
                }
                else if(b.type === 'video') {
                    html = `
                        <div class="block-item">
                            <div class="block-header">
                                <span class="block-title">▶️ Video</span>
                                <div class="block-actions">
                                    <button onclick="moveBlock(${b.id}, 'up')">⬆️</button>
                                    <button onclick="moveBlock(${b.id}, 'down')">⬇️</button>
                                    <button onclick="deleteBlock(${b.id})">🗑️</button>
                                </div>
                            </div>
                            <div class="block-body">
                                <input type="text" placeholder="URL de YouTube" value="${b.content}" onchange="updateVideo(${b.id}, this.value)" style="width:100%; padding:10px; background:#101114; border:1px solid #2a2d35; color:white; border-radius:6px;">
                            </div>
                        </div>`;
                }
                container.innerHTML += html;
            });
        }

        function format(cmd, value=null) { document.execCommand(cmd, false, value); }
        function updateText(id) {
            const el = document.getElementById('txt-' + id);
            const block = blocks.find(b => b.id === id);
            if(el && block) block.content = el.innerHTML;
        }
        function handleImg(input, id) {
            if (input.files && input.files[0]) {
                var reader = new FileReader();
                reader.onload = function (e) {
                    const block = blocks.find(b => b.id === id);
                    block.content = e.target.result;
                    const preview = document.getElementById('img-preview-' + id);
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    input.style.display = 'none';
                }
                reader.readAsDataURL(input.files[0]);
            }
        }
        function updateVideo(id, value) {
            const block = blocks.find(b => b.id === id);
            block.content = value;
        }
        function previewCover(input) {
            if (input.files && input.files[0]) {
                var reader = new FileReader();
                reader.onload = function (e) {
                    const preview = document.getElementById('cover-preview');
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    document.querySelector('.upload-text').style.display = 'none';
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        // --- PUBLICAR Y SINCRONIZAR ---
        function triggerSync() { localStorage.setItem('blogSyncTrigger', Date.now()); }

        function publishNews() {
            const title = document.getElementById('main-title').value;
            const cover = document.getElementById('cover-preview').src;
            const date = document.getElementById('main-date').value;

            if(!title || !cover) { showToast("⚠️ Falta título o portada"); return; }

            let finalHtml = '';
            
            blocks.forEach(b => {
                if(b.type === 'text') finalHtml += `<div style="margin-bottom:20px;">${b.content}</div>`;
                else if(b.type === 'image' && b.content) finalHtml += `<img src="${b.content}" style="display:block; max-width:100%; margin:20px auto; border-radius:8px;">`;
                else if(b.type === 'video' && b.content) {
                    let videoId = '';
                    let regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
                    let match = b.content.match(regExp);
                    if (match && match[2].length == 11) {
                        videoId = match[2];
                        finalHtml += `<div style="position:relative; padding-bottom:56.25%; height:0; overflow:hidden; margin:30px 0; border-radius:8px;"><iframe src="https://www.youtube.com/embed/${videoId}" style="position:absolute; top:0; left:0; width:100%; height:100%;" frameborder="0" allowfullscreen></iframe></div>`;
                    }
                }
            });

            const currentNews = JSON.parse(localStorage.getItem('blogNews')) || [];
            const newArticle = {
                id: Date.now(),
                title: title,
                img: cover,
                date: date,
                content: finalHtml,
                comments: []
            };
            currentNews.unshift(newArticle);
            localStorage.setItem('blogNews', JSON.stringify(currentNews));
            
            triggerSync();
            showToast("✅ ¡Noticia publicada con éxito!");
            
            // Reset
            document.getElementById('main-title').value = '';
            document.getElementById('cover-preview').style.display = 'none';
            document.querySelector('.upload-text').style.display = 'flex';
            blocks = [];
            renderBlocks();
        }

        function saveTop() {
            const newTop = [];
            for(let i=0; i<3; i++) {
                newTop.push({
                    rank: i+1,
                    title: document.getElementById('top-title-'+i).value,
                    genre: document.getElementById('top-genre-'+i).value
                });
            }
            localStorage.setItem('topAnime', JSON.stringify(newTop));
            triggerSync();
            showToast("✅ Top Anime actualizado");
        }

    </script>
</body>
</html>
