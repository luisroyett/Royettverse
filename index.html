<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luisroyett Anime Blog</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-color: #6c5ce7;
            --accent: #ff7675;
            --dark: #121212;
            --darker: #0a0a0a;
            --card: #1e1e1e;
            --text: #ffffff;
            --text-soft: #b2bec3;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--dark);
            color: var(--text);
            line-height: 1.6;
        }

        /* --- SCROLLBAR PERSONALIZADO --- */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--darker); }
        ::-webkit-scrollbar-thumb { background: var(--main-color); border-radius: 4px; }

        /* --- HEADER FIJO --- */
        header {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 20px rgba(0,0,0,0.5);
        }

        .header-top {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 5%; border-bottom: 1px solid #333;
        }

        .brand-area { display: flex; align-items: center; }
        .header-icon {
            width: 50px; height: 50px; margin-right: 15px;
            border-radius: 50%; object-fit: cover;
            border: 2px solid var(--main-color);
            box-shadow: 0 0 10px rgba(108, 92, 231, 0.5);
        }
        .header-titles h1 {
            font-family: 'Oswald', sans-serif; font-size: 1.8rem;
            text-transform: uppercase; background: linear-gradient(90deg, #fff, #b2bec3);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .header-titles span { font-size: 0.8rem; color: var(--main-color); letter-spacing: 2px; text-transform: uppercase; }

        .header-nav {
            display: flex; justify-content: center;
            padding: 0 5%; height: 50px; background-color: #111;
        }
        .nav-links { display: flex; gap: 5px; height: 100%; align-items: center; }
        
        /* Estilos base del botón */
        .nav-btn {
            background: transparent; color: #888; border: none;
            padding: 10px 25px; font-size: 0.9rem; cursor: pointer;
            text-transform: uppercase; font-weight: 500; transition: all 0.3s;
            position: relative; display: flex; align-items: center; gap: 5px;
            height: 100%;
        }
        .nav-btn:hover, .nav-btn.active { color: white; }
        .nav-btn.active::after {
            content: ''; position: absolute; bottom: 0; left: 0; width: 100%;
            height: 3px; background: var(--main-color);
        }

        /* Dropdown Menu (Desplegable) */
        .dropdown { position: relative; height: 100%; display: flex; align-items: center; }
        .dropdown-content {
            display: none; position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
            background-color: var(--card); min-width: 220px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5); border: 1px solid #333;
            border-radius: 0 0 8px 8px; z-index: 1001; overflow: hidden;
            animation: fadeIn 0.3s ease;
        }
        .dropdown:hover .dropdown-content { display: block; }
        
        .dropdown-item {
            display: block; padding: 12px 20px; color: var(--text-soft);
            text-decoration: none; transition: 0.2s; font-size: 0.9rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .dropdown-item:last-child { border-bottom: none; }
        .dropdown-item:hover {
            background-color: var(--main-color); color: white; padding-left: 25px;
        }
        
        /* Flecha indicadora */
        .arrow-down { font-size: 0.6rem; margin-left: 5px; transition: transform 0.3s; }
        .dropdown:hover .arrow-down { transform: rotate(180deg); color: var(--main-color); }

        @keyframes fadeIn { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

        /* Buscador y Icono SVG */
        .search-container { display: flex; align-items: center; position: relative; }
        .search-input {
            width: 0; padding: 0; border: none; background: transparent;
            color: white; transition: width 0.4s ease; outline: none;
        }
        .search-input.active { width: 200px; padding: 8px; background: #222; border-radius: 4px; margin-right: 10px; }
        
        .search-icon-btn {
            background: none; border: none; cursor: pointer; 
            padding: 5px; display: flex; align-items: center; justify-content: center;
            transition: transform 0.3s;
        }
        .search-icon-btn:hover { transform: scale(1.2); }
        .search-icon-btn svg { 
            width: 22px; height: 22px; fill: none; stroke: #888; 
            stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; 
            transition: stroke 0.3s;
        }
        .search-icon-btn:hover svg { stroke: var(--main-color); }

        /* --- CONTENIDO PRINCIPAL --- */
        .main-content { padding-top: 120px; }

        /* Hero Section */
        .hero-section { padding: 20px 5% 40px; }
        .hero-card {
            position: relative; height: 400px; border-radius: 15px;
            overflow: hidden; cursor: pointer; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }
        .hero-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
        .hero-card:hover .hero-img { transform: scale(1.05); }
        .hero-overlay {
            position: absolute; bottom: 0; left: 0; width: 100%;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            padding: 40px 30px 30px;
        }
        .hero-tag {
            background: var(--main-color); color: white; padding: 5px 10px;
            border-radius: 4px; font-size: 0.8rem; font-weight: bold;
            text-transform: uppercase; margin-bottom: 10px; display: inline-block;
        }
        .hero-title { font-family: 'Oswald'; font-size: 2.5rem; line-height: 1.2; margin-bottom: 10px; }
        .hero-date { color: var(--text-soft); }

        /* Sección Noticias Grid */
        .section-box { padding: 0 5% 40px; }
        .section-title {
            font-family: 'Oswald'; font-size: 1.5rem; margin-bottom: 20px;
            border-left: 5px solid var(--main-color); padding-left: 15px;
            text-transform: uppercase;
        }

        .news-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }
        .card {
            background: var(--card); border-radius: 8px; overflow: hidden;
            cursor: pointer; transition: transform 0.2s; border: 1px solid #333;
        }
        .card:hover { transform: translateY(-5px); border-color: var(--main-color); box-shadow: 0 5px 15px rgba(108, 92, 231, 0.2); }
        
        .card-img-box { overflow: hidden; height: 180px; }
        .card-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
        .card:hover .card-img { transform: scale(1.1); }
        
        .card-body { padding: 15px; }
        .card-title { font-size: 1.1rem; margin-bottom: 8px; }
        .card-date { font-size: 0.8rem; color: var(--main-color); }

        /* Animes del Momento (Con Medallas) */
        .top-list {
            background: var(--card); border-radius: 8px;
            padding: 20px; border: 1px solid #333;
        }
        .top-item {
            display: flex; align-items: center; margin-bottom: 15px;
            padding-bottom: 10px; border-bottom: 1px solid #333;
        }
        .top-item:last-child { border-bottom: none; }
        
        /* Medallas */
        .medal {
            width: 40px; height: 40px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; margin-right: 15px; flex-shrink: 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        .gold { background: linear-gradient(135deg, #FFD700, #FDB931); color: #000; }
        .silver { background: linear-gradient(135deg, #C0C0C0, #E8E8E8); color: #000; }
        .bronze { background: linear-gradient(135deg, #CD7F32, #E9967A); color: #000; }

        .top-info h4 { font-size: 1.1rem; margin-bottom: 5px; }
        .top-info span { font-size: 0.8rem; color: #888; }

        /* Contacto */
        .contact-form {
            background: var(--card); padding: 30px;
            border-radius: 8px; border: 1px solid #333;
        }
        .form-group { margin-bottom: 15px; }
        .form-control {
            width: 100%; padding: 10px; background: #000;
            border: 1px solid #333; color: white; border-radius: 4px;
        }
        .btn-submit {
            background: var(--main-color); color: white; border: none;
            padding: 10px 20px; border-radius: 4px; cursor: pointer;
            font-weight: bold; transition: background 0.3s;
        }
        .btn-submit:hover { background: #5a4ad1; }

        /* --- VISTA ARTÍCULO --- */
        #article-view { display: none; }
        .back-btn {
            background: #333; color: white; border: none;
            padding: 10px 20px; border-radius: 50px; cursor: pointer;
            margin: 20px 0; font-weight: bold; transition: 0.3s;
        }
        .back-btn:hover { background: var(--main-color); }
        .article-container {
            background: var(--card); border-radius: 10px;
            padding: 30px; border: 1px solid #333;
        }
        .article-feat-img {
            width: 100%; height: 400px; object-fit: cover;
            border-radius: 8px; margin-bottom: 20px;
        }
        .article-title {
            font-family: 'Oswald'; font-size: 2.2rem;
            margin-bottom: 15px; line-height: 1.3;
        }
        .article-meta { color: var(--main-color); margin-bottom: 25px; font-size: 0.9rem; }
        .article-content-area { color: #ddd; line-height: 1.8; margin-bottom: 30px; text-align: justify; }
        .article-content-area p { margin-bottom: 20px; }
        .article-content-area img {
            display: block; max-width: 100%; border-radius: 8px;
            margin: 20px auto;
        }
        .video-container {
            position: relative; padding-bottom: 56.25%; height: 0;
            overflow: hidden; margin: 30px 0; border-radius: 8px;
        }
        .video-container iframe {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        }

        /* Comentarios */
        .editor-box {
            background: #000; padding: 20px;
            border-radius: 8px; border: 1px solid #333;
        }
        .toolbar {
            background: #222; padding: 10px; border-radius: 4px;
            margin-bottom: 10px; display: flex; flex-wrap: wrap;
            gap: 10px; align-items: center;
        }
        .tool-btn {
            background: #333; color: white; border: none;
            width: 35px; height: 35px; cursor: pointer;
            border-radius: 4px; font-weight: bold;
        }
        .tool-btn:hover { background: var(--main-color); }
        .tool-select {
            background: #333; color: white; border: none;
            padding: 5px; border-radius: 4px; height: 35px;
        }
        .editor-content {
            min-height: 150px; background: #1a1a1a; padding: 15px;
            border-radius: 4px; color: white; border: 1px solid #333;
            outline: none;
        }
        .comment-card {
            background: #1a1a1a; padding: 15px; border-radius: 4px;
            margin-top: 15px; border-left: 3px solid var(--main-color);
        }

        /* Footer */
        footer {
            background: var(--darker); padding: 40px 5%;
            margin-top: 40px; border-top: 1px solid #333;
            text-align: center;
        }
        .footer-logo { font-family: 'Oswald'; font-size: 1.5rem; margin-bottom: 10px; color: var(--main-color); }
        .footer-text { color: #555; font-size: 0.9rem; }

        /* Scroll Top */
        .scroll-top {
            position: fixed; bottom: 20px; right: 20px; width: 50px; height: 50px;
            background: var(--main-color); color: white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            opacity: 0; pointer-events: none; transition: 0.3s; font-size: 1.5rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 999;
        }
        .scroll-top.visible { opacity: 1; pointer-events: auto; }

        @media (max-width: 768px) {
            .header-nav { height: auto; padding: 10px 0; }
            .nav-links { flex-wrap: wrap; justify-content: center; }
            .article-feat-img { height: 220px; }
            .dropdown-content { position: absolute; left: auto; right: auto; width: 100%; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-top">
            <div class="brand-area">
                <img src="https://placehold.co/100x100/6c5ce7/ffffff?text=L" alt="Logo" class="header-icon">
                <div class="header-titles">
                    <h1>Luisroyett</h1>
                    <span>News & Anime</span>
                </div>
            </div>
            <div class="header-actions">
                <div class="search-container">
                    <input type="text" id="search-bar" class="search-input" placeholder="Buscar noticias...">
                    <!-- Icono SVG Estético -->
                    <button class="search-icon-btn" onclick="toggleSearch()">
                        <svg viewBox="0 0 24 24">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
        <nav class="header-nav">
            <div class="nav-links">
                <!-- Inicio -->
                <a href="#section-inicio"><button class="nav-btn active">Inicio</button></a>

                <!-- Noticias Dropdown -->
                <div class="dropdown">
                    <button class="nav-btn">Noticias <span class="arrow-down">▼</span></button>
                    <div class="dropdown-content">
                        <a href="#section-noticias" class="dropdown-item">🎮 Juegos</a>
                        <a href="#section-noticias" class="dropdown-item">📺 Anime General</a>
                        <a href="#section-noticias" class="dropdown-item">🔥 Hentai</a>
                    </div>
                </div>

                <!-- Animes del Momento Dropdown -->
                <div class="dropdown">
                    <button class="nav-btn">Animes del Momento <span class="arrow-down">▼</span></button>
                    <div class="dropdown-content">
                        <a href="#section-top" class="dropdown-item">🎮 Juegos Anime</a>
                        <a href="#section-top" class="dropdown-item">🩸 Anime Gore</a>
                        <a href="#section-top" class="dropdown-item">💋 Anime Ecchi</a>
                    </div>
                </div>

                <!-- Contacto Dropdown -->
                <div class="dropdown">
                    <button class="nav-btn">Contacto <span class="arrow-down">▼</span></button>
                    <div class="dropdown-content">
                        <a href="mailto:luismarioroyettjimenez@gmail.com" class="dropdown-item">📧 Email</a>
                        <a href="tel:04248120250" class="dropdown-item">📱 Teléfono</a>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <div class="main-content">
        <section id="home-view">
            
            <!-- Hero Section -->
            <section class="hero-section" id="section-inicio">
                <div id="hero-container">
                    <!-- Se llena con JS -->
                </div>
            </section>

            <!-- Noticias Grid -->
            <section class="section-box" id="section-noticias">
                <div class="section-title">Últimas Noticias</div>
                <div class="news-grid" id="news-container">
                    <!-- Se llena con JS -->
                </div>
            </section>

            <!-- Top Anime -->
            <section class="section-box" id="section-top">
                <!-- Título Cambiado -->
                <div class="section-title">Animes del Momento</div>
                <div class="top-list" id="top-list-container">
                    <!-- Se llena con JS -->
                </div>
            </section>

            <!-- Contacto -->
            <section class="section-box" id="section-contacto">
                <div class="section-title">Contacto</div>
                <div class="contact-form">
                    <div class="form-group">
                        <input type="text" class="form-control" placeholder="Tu Nombre">
                    </div>
                    <div class="form-group">
                        <input type="email" class="form-control" placeholder="Tu Email">
                    </div>
                    <div class="form-group">
                        <textarea class="form-control" rows="4" placeholder="Tu Mensaje"></textarea>
                    </div>
                    <button class="btn-submit">Enviar Mensaje</button>
                </div>
            </section>
        </section>

        <!-- Vista Artículo -->
        <section id="article-view">
            <div style="padding: 0 5%;">
                <button class="back-btn" onclick="closeArticle()">← Volver al Inicio</button>
                <article class="article-container">
                    <img id="a-img" src="" alt="" class="article-feat-img">
                    <h2 id="a-title" class="article-title"></h2>
                    <div id="a-meta" class="article-meta"></div>
                    <div id="a-content" class="article-content-area"></div>

                    <div class="editor-box">
                        <h3>Deja tu Comentario</h3>
                        <div class="toolbar">
                            <button class="tool-btn" onclick="formatDoc('bold')"><b>B</b></button>
                            <button class="tool-btn" onclick="formatDoc('italic')"><i>I</i></button>
                            <button class="tool-btn" onclick="formatDoc('underline')"><u>U</u></button>
                            <select class="tool-select" onchange="formatDoc('fontName', this.value)">
                                <option value="Arial">Arial</option>
                                <option value="Georgia">Georgia</option>
                            </select>
                            <select class="tool-select" onchange="formatDoc('fontSize', this.value)">
                                <option value="3">Normal</option>
                                <option value="5">Grande</option>
                            </select>
                        </div>
                        <div id="editor-content" class="editor-content" contenteditable="true"></div>
                        <button class="btn-submit" onclick="submitComment()">Publicar</button>
                        <div id="comments-list" style="margin-top:15px;"></div>
                    </div>
                </article>
            </div>
        </section>
    </div>

    <footer>
        <div class="footer-logo">LUISROYETT ANIME</div>
        <p class="footer-text">© 2024 Todos los derechos reservados. Diseñado con pasión.</p>
    </footer>

    <div class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0, behavior:'smooth'})">⬆</div>

    <script>
        // --- SINCRONIZACIÓN Y DATOS ---
        window.addEventListener('storage', function(event) {
            if (event.key === 'blogSyncTrigger') loadAll();
        });

        const defaultNews = [{ id: 1, title: "Bienvenidos al Blog", img: "https://placehold.co/1200x500/555/fff?text=Hola", date: "Hoy", content: "<p>Empieza a crear contenido desde el panel admin.</p>", comments: [] }];
        const defaultTop = [
            { rank: 1, title: "Frieren", genre: "Fantasía" }, 
            { rank: 2, title: "One Piece", genre: "Aventura" }, 
            { rank: 3, title: "Jujutsu Kaisen", genre: "Acción" }
        ];
        
        let newsData = JSON.parse(localStorage.getItem('blogNews')) || defaultNews;
        let topAnimeData = JSON.parse(localStorage.getItem('topAnime')) || defaultTop;
        let currentArticleId = null;

        function loadAll() {
            newsData = JSON.parse(localStorage.getItem('blogNews')) || defaultNews;
            topAnimeData = JSON.parse(localStorage.getItem('topAnime')) || defaultTop;
            newsData.sort((a, b) => b.id - a.id);
            loadHero();
            loadNews();
            loadTopAnime();
        }

        function loadHero() {
            const container = document.getElementById('hero-container');
            if(newsData.length > 0){
                const heroNews = newsData[0];
                container.innerHTML = `
                    <div class="hero-card" onclick="openArticle(${heroNews.id})">
                        <img src="${heroNews.img}" class="hero-img">
                        <div class="hero-overlay">
                            <span class="hero-tag">Noticia Destacada</span>
                            <h2 class="hero-title">${heroNews.title}</h2>
                            <div class="hero-date">${heroNews.date}</div>
                        </div>
                    </div>
                `;
            }
        }

        function loadNews() {
            const container = document.getElementById('news-container');
            container.innerHTML = '';
            const gridNews = newsData.slice(1); 
            if(gridNews.length === 0) {
                container.innerHTML = '<p style="color:#888;">No hay más noticias.</p>';
                return;
            }
            gridNews.forEach(n => {
                container.innerHTML += `
                    <div class="card" onclick="openArticle(${n.id})">
                        <div class="card-img-box">
                            <img src="${n.img}" class="card-img">
                        </div>
                        <div class="card-body">
                            <div class="card-date">${n.date}</div>
                            <h3 class="card-title">${n.title}</h3>
                        </div>
                    </div>
                `;
            });
        }

        function loadTopAnime() {
            const container = document.getElementById('top-list-container');
            container.innerHTML = '';
            const medals = ['gold', 'silver', 'bronze'];
            topAnimeData.forEach((item, i) => {
                container.innerHTML += `
                    <div class="top-item">
                        <div class="medal ${medals[i]}">${i+1}</div>
                        <div class="top-info">
                            <h4>${item.title}</h4>
                            <span>${item.genre}</span>
                        </div>
                    </div>
                `;
            });
        }

        function openArticle(id) {
            currentArticleId = id;
            const n = newsData.find(item => item.id === id);
            if(!n) return;
            document.getElementById('a-img').src = n.img;
            document.getElementById('a-title').innerText = n.title;
            document.getElementById('a-meta').innerHTML = `<span>📅 ${n.date}</span> <span>✍️ Luisroyett</span>`;
            document.getElementById('a-content').innerHTML = n.content;
            const list = document.getElementById('comments-list');
            list.innerHTML = '';
            if(n.comments && n.comments.length > 0) {
                n.comments.forEach(c => {
                    list.innerHTML += `<div class="comment-card"><div style="color:var(--main-color); font-weight:bold;">@${c.name}</div><div style="margin-top:5px;">${c.text}</div></div>`;
                });
            }
            document.getElementById('home-view').style.display = 'none';
            document.getElementById('article-view').style.display = 'block';
            window.scrollTo(0, 0);
        }

        function closeArticle() {
            document.getElementById('home-view').style.display = 'block';
            document.getElementById('article-view').style.display = 'none';
            window.scrollTo(0, 0);
        }

        function toggleSearch() {
            document.getElementById('search-bar').classList.toggle('active');
        }

        function formatDoc(cmd, value=null) {
            if(value) document.execCommand(cmd, false, value);
            else document.execCommand(cmd, false, null);
        }

        function submitComment() {
            const content = document.getElementById('editor-content').innerHTML;
            if(content.trim() === "") return;
            const list = document.getElementById('comments-list');
            list.innerHTML = `<div class="comment-card"><div style="color:var(--main-color); font-weight:bold;">@Usuario</div><div style="margin-top:5px;">${content}</div></div>` + list.innerHTML;
            document.getElementById('editor-content').innerHTML = '';
        }

        window.onscroll = function() {
            const btn = document.getElementById('scrollTop');
            if (document.documentElement.scrollTop > 300) btn.classList.add('visible');
            else btn.classList.remove('visible');
        };

        loadAll();
    </script>
</body>
</html>
